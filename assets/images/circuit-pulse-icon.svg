<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Tech Gradient -->
    <linearGradient id="circuitPulseIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E4FF"/>
      <stop offset="50%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#FF9340"/>
    </linearGradient>

    <!-- Soft Glow -->
    <filter id="softGlowIcon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit Frame -->
  <rect x="20" y="20" width="60" height="60" rx="12"
        stroke="url(#circuitPulseIconGrad)" stroke-width="5"
        fill="none" filter="url(#softGlowIcon)"/>

  <!-- Central AI Pulse -->
  <circle cx="50" cy="50" r="12" fill="url(#circuitPulseIconGrad)" filter="url(#softGlowIcon)" />

  <!-- Circuit Lines -->
  <line x1="50" y1="10" x2="50" y2="20" stroke="url(#circuitPulseIconGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="80" x2="50" y2="90" stroke="url(#circuitPulseIconGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="10" y1="50" x2="20" y2="50" stroke="url(#circuitPulseIconGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="50" x2="90" y2="50" stroke="url(#circuitPulseIconGrad)" stroke-width="4" stroke-linecap="round"/>
</svg>
